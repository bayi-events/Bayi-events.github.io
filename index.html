<style>
    /* --- 高級公關大氣配色底層邏輯 --- */
    :root { 
        --brand-dark: #111111;      /* 高奢極致黑 */
        --brand-red: #8B1E2B;       /* 時尚勃艮第紅 */
        --brand-gold: #c5a059;      /* 香檳金細節 */
        --bg-light: #fcfbfa;        /* 頂級藝廊純淨灰白 */
        --text-dark: #1a1a1a;
        --text-muted: #666666;
        --card-bg: #ffffff;
    }

    body, html { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif; 
        background-color: var(--bg-light); 
        margin: 0; 
        width: 100%;
        overflow-x: hidden;
        color: var(--text-dark);
        -webkit-font-smoothing: antialiased;
    }

    body.is-loading { overflow: hidden !important; }
    .object-fit-cover { object-fit: cover; }
    
    .main-wrapper {
        width: 100%;
        max-width: 1340px;
        margin: 0 auto;
        padding: 80px 24px !important; /* 加大整體上下留白，營造公關公司流暢呼吸感 */
        box-sizing: border-box; 
    }

    /* --- 1. 導覽列：升級為現代化半透明懸浮感 --- */
    .navbar { 
        background-color: rgba(17, 17, 17, 0.85) !important; 
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 1px 0px rgba(255,255,255,0.08); 
        padding: 18px 0;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 1000;
        transition: all 0.4s ease;
    }
    .navbar-brand { 
        font-weight: 800; 
        color: #ffffff !important; 
        font-size: 1.4rem; 
        letter-spacing: 2px; 
    }
    .nav-link { 
        color: rgba(255,255,255,0.75) !important; 
        font-weight: 400; 
        letter-spacing: 1px;
        margin-left: 15px;
        transition: color 0.3s ease;
    }
    .nav-link:hover {
        color: var(--brand-gold) !important;
    }

    /* --- 2. Loading 畫面 --- */
    #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
        background: #ffffff; z-index: 9999; display: flex;
        flex-direction: column; justify-content: flex-start; align-items: center;        
        padding-top: 30vh; transition: opacity 0.8s ease-out;
    }
    .logo-box { width: 220px; display: flex; flex-direction: column; align-items: center; }
    #loading-screen .logo-box svg {
        width: 220px !important; height: auto !important;
        transform-origin: 30% 40%; 
        animation: masterEntrance 1.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    #tent-part {
        opacity: 0; transform: scale(0);
        animation: tentBounce 0.6s 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .brand-name-loading { 
        font-size: 24px; font-weight: 900; color: #000; margin-top: 15px;
        letter-spacing: 4px; opacity: 0; animation: fadeIn 1s 1.5s forwards; 
        text-align: center; width: 100%;
    }

    /* --- 3. Hero 主視覺：加高且改進奢華漸層遮罩 --- */
    #heroCarousel { 
        height: 80vh; 
        min-height: 550px; 
        background-color: #000; 
        position: relative; 
        overflow: hidden; 
        margin-top: 0;
    }
    .carousel-inner, .carousel-item { height: 100%; }
    .hero-bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; }
    .hero-bg-layer::after {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.85) 100%); 
        z-index: 2;
    }
    .carousel-caption-custom { position: absolute; bottom: 15%; left: 8%; text-align: left; z-index: 10; width: 80%; }
    .carousel-caption-custom h1, .hero-subtitle {
        font-size: 3.5rem !important; font-weight: 800 !important; color: #ffffff !important; 
        text-shadow: none; letter-spacing: 4px; margin-bottom: 12px;
    }
    .hero-desc { 
        display: block; 
        font-size: 1.2rem !important; 
        color: rgba(255,255,255,0.85) !important; 
        background: transparent; 
        padding: 0; 
        border-left: 3px solid var(--brand-gold); 
        padding-left: 15px;
        backdrop-filter: none; 
    }

    /* --- 4. 區塊標題設計 --- */
    .custom-section-title {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: 3px;
        color: var(--brand-dark);
        margin-bottom: 40px;
        position: relative;
        display: inline-block;
    }
    .custom-section-title::after {
        content: '';
        display: block;
        width: 100%;
        height: 2px;
        background: var(--brand-red);
        margin-top: 10px;
    }

    /* --- 5. 服務項目卡片：改為時尚無邊框俐落排版 --- */
    .glow-card-final {
        transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) !important;
        position: relative; 
        z-index: 1; 
        border-radius: 0px !important; /* 俐落直角更具時尚現代感 */
        overflow: hidden;
        border: none !important; 
        background: #ffffff !important;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04) !important;
    }

    .glow-card-final .card-body {
        background: #ffffff !important;
        padding: 20px 15px !important;
        border-top: 1px solid #f0f0f0;
        transition: all 0.4s ease;
    }

    /* 滑鼠懸停：公關流暢優雅動效 */
    .col:hover .glow-card-final {
        transform: translateY(-10px) !important; 
        z-index: 10 !important;
        box-shadow: 0 25px 50px rgba(139, 30, 43, 0.12) !important;
    }
    .col:hover .glow-card-final .card-body {
        background: var(--brand-dark) !important;
    }
    .col:hover .glow-card-final .card-body h6 {
        color: #ffffff !important;
        letter-spacing: 2px;
    }

    .glow-card-final img { 
        width: 100%; 
        transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1); 
        object-fit: cover; 
    }
    .col:hover img { transform: scale(1.05); }
    
    /* --- 6. 數位控管系統美化 --- */
    #monitor-card { 
        transform: none !important; 
        border-radius: 0px !important;
        box-shadow: 0 15px 40px rgba(0,0,0,0.06) !important; 
        border: none !important;
    }
    .btn-danger {
        background-color: var(--brand-red) !important;
        border-color: var(--brand-red) !important;
        border-radius: 0px;
    }
    .btn-group .btn {
        border-radius: 0px !important;
    }

    /* --- 7. Gallery & Lightbox 精品黑化展示級設定 --- */
    .album-card {
        border-radius: 0px !important;
        border: none !important;
        overflow: hidden;
        background: transparent !important;
        transition: all 0.5s ease;
    }
    .album-img-wrapper { 
        position: relative; width: 100%; aspect-ratio: 3 / 2; overflow: hidden; 
    }
    .album-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease; }
    .album-card:hover .album-img { transform: scale(1.06); }
    
    .photo-tag {
        position: absolute; top: 12px; left: 12px; background: rgba(17,17,17,0.85);
        color: #fff; padding: 4px 10px; font-size: 0.75rem; letter-spacing: 1px; z-index: 5;
    }

    #imgLightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 11, 11, 0.98); display: none; align-items: center; justify-content: center; z-index: 10000; }
    .lightbox-content { display: flex; width: 92vw; height: 85vh; background: #161616; border-radius: 0px; overflow: hidden; position: relative; box-shadow: 0 30px 70px rgba(0,0,0,0.5); }
    .lightbox-image-side { flex: 1; display: flex; align-items: center; justify-content: center; background: #0b0b0b; }
    .lightbox-image-side img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .lightbox-info-side { flex: 0 0 420px; padding: 50px 40px; background: #161616; color: white; overflow-y: auto; border-left: 1px solid rgba(255,255,255,0.05); }

    /* --- 8. 燈箱內按鈕優化 --- */
    .btn-close {
        position: absolute !important; top: 20px !important; right: 20px !important;
        z-index: 1065 !important; background-color: rgba(255,255,255,0.1) !important; 
        border: none !important; border-radius: 50% !important; 
        width: 44px !important; height: 44px !important; display: flex !important;
        align-items: center; justify-content: center; opacity: 0.8 !important;
        transition: all 0.3s ease;
    }
    .btn-close:hover { background-color: var(--brand-red) !important; opacity: 1 !important; transform: rotate(90deg); }
    .btn-close::before, .btn-close::after { content: ''; position: absolute; width: 2px; height: 18px; background-color: #ffffff !important; }
    .btn-close::before { transform: rotate(45deg); }
    .btn-close::after { transform: rotate(-45deg); }

    /* --- 9. LINE 詢問頁籤：高質感公關黑紅拼色 --- */
    .floating-line-btn {
        position: fixed;
        bottom: 40px;
        right: 40px;
        z-index: 9999;
        background: linear-gradient(135deg, var(--brand-red) 0%, #521019 100%);
        color: white !important;
        padding: 14px 26px;
        border-radius: 50px; /* 膠囊圓角非常有現代App感 */
        text-decoration: none !important;
        display: flex;
        align-items: center;
        font-weight: 600;
        letter-spacing: 1px;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 15px 35px rgba(139,30,43,0.3);
        opacity: 0;
        visibility: hidden;
        transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    body:not(.is-loading) .floating-line-btn {
        opacity: 1;
        visibility: visible;
        animation: fadeInUpBtn 0.8s 2s ease forwards;
    }
    @keyframes fadeInUpBtn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .floating-line-btn i { font-size: 22px; margin-right: 10px; color: #fff; }
    .floating-line-btn::before {
        content: ''; width: 8px; height: 8px; background: #00ff00; border-radius: 50%;
        margin-right: 10px; box-shadow: 0 0 10px #00ff00;
        animation: pulse-green 2s infinite;
    }
    .floating-line-btn:hover {
        transform: scale(1.05) translateY(-5px) !important;
        box-shadow: 0 20px 40px rgba(139, 30, 43, 0.5);
        background: linear-gradient(135deg, #a62435 0%, var(--brand-red) 100%);
    }

    /* --- 10. 社群與版權宣告區塊 --- */
    .social-section { 
        background-color: #111111 !important; 
        color: #ffffff !important; 
        text-align: center; 
        padding: 5.5rem 0; 
        width: 100%; 
        margin-bottom: 0px; 
        display: block; 
    }
    .social-section h3 {
        letter-spacing: 3px;
        font-weight: 700;
    }
    .social-icons a {
        transition: transform 0.3s ease, color 0.3s ease;
    }
    .social-icons a:hover {
        color: var(--brand-gold) !important;
        transform: scale(1.15);
    }

    /* RWD 文字尺寸系統優化 */
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    .flex-container, .navbar, .carousel-caption-custom { max-width: 100vw; overflow: hidden; }

    @media (max-width: 992px) {
        .lightbox-content { flex-direction: column; height: 95vh; }
        .lightbox-image-side { flex: 0 0 50%; }
        .lightbox-info-side { flex: 1; width: 100%; padding: 30px; border-left: none; border-top: 1px solid rgba(255,255,255,0.05); }
    }
    @media (max-width: 768px) {
        .carousel-caption-custom h1 { font-size: 2.2rem !important; }
        .main-wrapper { padding: 50px 15px !important; }
        .floating-line-btn { bottom: 20px; right: 20px; padding: 12px 20px; font-size: 14px; }
        body.modal-open .floating-line-btn { display: none; }
    }

    @keyframes pulse-green {
        0% { transform: scale(0.9); opacity: 0.7; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(0.9); opacity: 0.7; }
    }
    @keyframes masterEntrance { 0% { opacity: 0; transform: scale(3); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes tentBounce { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

function openProductModal(catKey) {
        const data = productLibrary[catKey];
        if (!data) return;

        const modalTitle = document.getElementById('prod-modal-title');
        const listEl = document.getElementById('prod-list');
        const prodImg = document.getElementById('prod-img');
        const prodName = document.getElementById('prod-name');
        const prodSpecs = document.getElementById('prod-specs');

        modalTitle.innerText = data.title;
        currentTabId = data.tab;
        listEl.innerHTML = '';

        data.items.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'list-group-item list-group-item-action';
            btn.style.borderRadius = '0px';
            btn.innerText = item.name;
            btn.onclick = () => {
                prodImg.src = item.img;
                prodName.innerText = item.name;
                prodSpecs.innerHTML = item.specs;
                document.querySelectorAll('#prod-list .list-group-item').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
            };
            listEl.appendChild(btn);
            if(index === 0) btn.click();
        });

        new bootstrap.Modal(document.getElementById('productModal')).show();
    }

    function closeProductAndOpenAlbum() {
        const modal = bootstrap.Modal.getInstance(document.getElementById('productModal'));
        if (modal) modal.hide();
        setTimeout(() => {
            const albumModalEl = document.getElementById('albumModal');
            const albumModal = new bootstrap.Modal(albumModalEl);
            albumModal.show();
            const tabTrigger = document.getElementById(currentTabId);
            if (tabTrigger) {
                new bootstrap.Tab(tabTrigger).show();
            }
        }, 400);
    }

function openAlbumTab(tabId) {
    const albumModalEl = document.getElementById('albumModal');
    let albumModal = bootstrap.Modal.getInstance(albumModalEl);
    if (!albumModal) {
        albumModal = new bootstrap.Modal(albumModalEl);
    }
    albumModal.show();
    albumModalEl.addEventListener('shown.bs.modal', function () {
        const tabEl = document.getElementById(tabId);
        if (tabEl) {
            const tab = new bootstrap.Tab(tabEl);
            tab.show();
        }
    }, { once: true }); 
}

function loadGallery(containerId, list) {
    const rowContainer = document.querySelector(`#${containerId} .row`);
    if (!rowContainer) return;
    rowContainer.innerHTML = list.map(id => {
        const item = photoLibrary[id];
        if(!item) return ''; 
        return `
            <div class="col-md-4 col-lg-3 mb-4" onclick="openProjectGallery('${id}')" style="cursor:pointer;">
                <div class="album-card">
                    <div class="album-img-wrapper">
                        <span class="photo-tag">${item.tag}</span>
                        <img src="${item.images[0]}" class="album-img" loading="lazy" alt="${item.title}">
                    </div>
                </div>
            </div>`;
    }).join('');
}

function openProjectGallery(projectId) {
    currentProject = photoLibrary[projectId];
    if (!currentProject) return;
    currentImgIdx = 0;
    updateLightbox();
}

function updateLightbox() {
    const lb = document.getElementById('imgLightbox');
    if(!lb || !currentProject) return;
    const info = currentProject;
    const formattedDesc = info.desc.replace(/\n/g, '<br>');
    
    lb.innerHTML = `
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <div class="lightbox-image-side" id="lightbox-touch-area" style="position:relative; user-select:none;">
                <img src="${info.images[currentImgIdx]}" id="target-img" style="pointer-events:none;" alt="放大圖">
                
                ${info.images.length > 1 ? `
                    <button class="nav-btn prev" onclick="changeImage(-1)" style="position:absolute; left:20px; background:transparent; border:none; color:rgba(255,255,255,0.6); font-size:3rem; cursor:pointer; z-index:10; transition:color 0.3s;">❮</button>
                    <button class="nav-btn next" onclick="changeImage(1)" style="position:absolute; right:20px; background:transparent; border:none; color:rgba(255,255,255,0.6); font-size:3rem; cursor:pointer; z-index:10; transition:color 0.3s;">❯</button>
                    <div class="img-counter" style="position:absolute; bottom:20px; color:white; background:rgba(0,0,0,0.6); padding:4px 14px; border-radius:30px; font-size:0.85rem;"><span class="current">${currentImgIdx + 1}</span> / <span class="total">${info.images.length}</span></div>
                ` : ''}
            </div>

            <div class="lightbox-info-side">
                <h3 style="color: var(--brand-red); font-weight:700; margin-bottom:15px;">${info.title}</h3>
                <p class="text-muted" style="font-size:0.9rem;"><i class="bi bi-geo-alt-fill me-2"></i>${info.loc}</p>
                <hr style="opacity:0.1; margin:25px 0;">
                <div class="info-body"><p style="line-height:1.7; opacity:0.85;">${formattedDesc}</p></div>
                <button class="btn btn-outline-light w-100 mt-5" style="border-radius:0px;" onclick="closeLightbox()">關閉展示</button>
            </div>
        </div>`;
        
    lb.style.display = 'flex';
    document.body.style.overflow = 'hidden';

    const touchArea = document.getElementById('lightbox-touch-area');
    touchArea.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive: true});
    touchArea.addEventListener('touchend', e => { handleSwipe(e.changedTouches[0].clientX); }, {passive: true});
    touchArea.addEventListener('mousedown', e => { startX = e.clientX; isDragging = true; });
    touchArea.addEventListener('mouseup', e => { if(isDragging) { handleSwipe(e.clientX); isDragging = false; } });
}

function handleSwipe(endX) {
    const diff = startX - endX;
    if (Math.abs(diff) > 50) { 
        if (diff > 0) changeImage(1);  
        else changeImage(-1);          
    }
}

function changeImage(step) {
    if(!currentProject) return;
    currentImgIdx = (currentImgIdx + step + currentProject.images.length) % currentProject.images.length;
    document.getElementById('target-img').src = currentProject.images[currentImgIdx];
    const counter = document.querySelector('.img-counter .current');
    if(counter) counter.innerText = currentImgIdx + 1;
}

function closeLightbox() {  
    document.getElementById('imgLightbox').style.display = 'none';  
    document.body.style.overflow = 'auto';  
}

window.addEventListener('load', function() {
    const subPages = ['about-section', 'cooperation-section']; 
    subPages.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none'; 
    });

    const mainSections = ['heroCarousel', 'main-content']; 
    mainSections.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'block';
    });

    try {
        loadGallery('gallery-1', photos_Tables);
        loadGallery('gallery-2', photos_Truss);
        loadGallery('gallery-3', photos_Tent);
        loadGallery('gallery-4', photos_Stage);
        loadGallery('gallery-5', photos_Decor);
        console.log("✅ 相簿載入完成");
    } catch (e) {
        console.warn("⚠️ 相簿加載異常:", e);
    }

    const loader = document.getElementById('loading-screen');
    if (loader) {
        new Audio('低沉穩重的進場音.mp3').play().catch(e => {});
        setTimeout(() => {
            new Audio('俏皮彈出音.mp3').play().catch(e => {});
        }, 1200);

        setTimeout(() => {
            loader.style.opacity = '0'; 
            setTimeout(() => {
                loader.style.display = 'none'; 
                loader.style.zIndex = '-1';
                document.body.classList.remove('is-loading');
                document.body.style.overflow = 'auto'; 
                window.scrollTo(0, 0);
            }, 850); 
        }, 2500); 
    }
});

if ('scrollRestoration' in history) {
    history.scrollRestoration = 'manual';
}
