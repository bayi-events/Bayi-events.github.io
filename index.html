<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="7o8o6r3uEbED_5QpoN-259MRNZC_HPPmaunm7xorudo" />
    <title>蘆洲帳篷租賃、Truss搭建｜八毅硬體結構 - 在地專業活動設備與舞台工程</title>
    <meta name="description" content="八毅硬體結構深耕蘆洲、五股地區，提供專業阿里山帳篷、宮廷帳、圓拱帳、Truss結構搭建及舞台桌椅租賃。">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">

<style>
    :root { --brand-red: #8B1E2B; --brand-red-dark: #5a111b; --bg-light: #FAFAFA; --text-main: #111111; --text-muted: #666666; }
    body { background-color: var(--bg-light); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #fff; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .navbar { background: rgba(250,250,250,0.95); backdrop-filter: blur(15px); padding: 18px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
    .navbar-brand { font-weight: 800; color: var(--brand-red) !important; letter-spacing: 2px; }
    .hero-title-section { max-width: 1100px; margin: 150px auto 70px; padding: 0 25px; }
    .bento-grid-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; max-width: 1200px; margin: 0 auto 80px; padding: 0 25px; }
    .bento-item { border-radius: 20px; overflow: hidden; position: relative; height: 290px; cursor: pointer; transition: 0.4s; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    .bento-item:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(139,30,43,0.2); }
    .bento-img { width: 100%; height: 100%; object-fit: cover; }
    .bento-overlay { position: absolute; bottom: 0; padding: 30px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: #fff; width: 100%; }
    .grid-large { grid-column: span 2; grid-row: span 2; height: 605px; }
    .grid-text-card { background: linear-gradient(135deg, var(--brand-red), var(--brand-red-dark)); color: #fff; padding: 40px; cursor: default; }
    .fb-plugin-section { text-align: center; margin-bottom: 100px; }
    .floating-line-btn { position: fixed; bottom: 40px; right: 40px; z-index: 9999; background: #06C755; color: white !important; padding: 15px 28px; border-radius: 50px; text-decoration: none !important; display: flex; align-items: center; box-shadow: 0 15px 35px rgba(6, 199, 85, 0.35); }
    /* 相簿圖片樣式 */
    .album-thumb { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; }
</style>
</head>
<body>

    <div id="loading-screen"><div class="logo-box"><img src="logo.png" width="180"><h3>八毅硬體結構</h3></div></div>
    
    <nav class="navbar navbar-expand-lg"><div class="container"><a class="navbar-brand" href="#">八毅硬體結構</a></div></nav>

    <div class="hero-title-section">
        <h1>為您打造<span>完美活動現場</span></h1>
        <p>專業活動硬體服務，深耕蘆洲、五股在地服務。</p>
    </div>

    <div class="bento-grid-gallery">
        <div class="bento-item grid-large" onclick="openProductModal('tents')"><img src="https://i.postimg.cc/pdsM7FFj/109898_0.jpg" class="bento-img"><div class="bento-overlay"><h3>帳篷設備</h3></div></div>
        <div class="bento-item grid-text-card"><h2>極致的<br>硬體工藝</h2><p>從結構安全到視覺美感，我們致力於提供最乾淨、安全的活動硬體。</p></div>
        <div class="bento-item" onclick="openProductModal('truss')"><img src="https://i.postimg.cc/HLybvQKF/黎國際_三重水樣啵啵_Truss進場.jpg" class="bento-img"><div class="bento-overlay"><h3>Truss 結構</h3></div></div>
        <div class="bento-item" onclick="openProductModal('stage')"><img src="https://i.postimg.cc/N0swp4LW/109886(1).jpg" class="bento-img"><div class="bento-overlay"><h3>舞台架設</h3></div></div>
        <div class="bento-item" onclick="openProductModal('chairs')"><img src="https://i.postimg.cc/KzhB61hF/黎國際_漢來飯店_高8桌_進場.jpg" class="bento-img"><div class="bento-overlay"><h3>桌椅租賃</h3></div></div>
        <div class="bento-item" onclick="openProductModal('others')"><img src="https://i.postimg.cc/7PGvv4fG/S-18309127.jpg" class="bento-img"><div class="bento-overlay"><h3>活動周邊</h3></div></div>
    </div>

    <div class="fb-plugin-section">
        <h3>關注最新動態</h3>
        <iframe src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2FBayiEventHardware&tabs=timeline&width=340&height=500" width="340" height="500" style="border:none;overflow:hidden"></iframe>
    </div>

    <a href="https://line.me/R/ti/p/@998cnhao" class="floating-line-btn" target="_blank"><i class="bi bi-line"></i><span>LINE 預約諮詢</span></a>

    <!-- Modals -->
    <div class="modal fade" id="productModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-body"><div class="row"><div class="col-4" id="prod-list"></div><div class="col-8"><img id="prod-img" class="img-fluid rounded mb-2"><h5 id="prod-name"></h5><p id="prod-specs" class="small text-muted"></p></div></div></div><div class="modal-footer"><button class="btn btn-dark" onclick="closeProductAndOpenAlbum()">查看相簿</button></div></div></div></div>
    <div class="modal fade" id="albumModal" tabindex="-1"><div class="modal-dialog modal-xl"><div class="modal-content"><div class="modal-body"><div class="tab-content" id="albumTabContent"></div></div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const productLibrary = {
    'chairs': { title: '桌椅租賃', tab: 'gallery-1', items: [{name:'會議桌', img:'https://i.postimg.cc/fLFnWQCg/109909_0.jpg'}, {name:'黑金剛椅', img:'https://i.postimg.cc/kGFc1xVC/日坊_林口竹林寺_黑金剛_進場.jpg'}, {name:'點心椅', img:'https://i.postimg.cc/nzfByXft/黎國際_三重水樣啵啵_點心椅進場.jpg'}]},
    'truss': { title: 'Truss 結構', tab: 'gallery-2', items: [{name:'Truss帳', img:'https://i.postimg.cc/yxPmXsGv/日坊_竹林山觀音寺_Truss帳_進場.jpg'}, {name:'造型Truss', img:'https://i.postimg.cc/yN9zD1bQ/ao-rui-zhang-rong-fa-ji-jin-hui-jin-chang2.jpg'}, {name:'牌樓', img:'https://i.postimg.cc/LXFLcJKW/黎國際_三重水樣啵啵_Trus進場2.jpg'}, {name:'背板', img:'https://i.postimg.cc/nc22qGbp/鑫創土城_Truss_進場.jpg'}]},
    'tents': { title: '帳篷設備', tab: 'gallery-3', items: [{name:'圓拱帳', img:'https://i.postimg.cc/pdsM7FFj/109898_0.jpg'}, {name:'宮廷帳', img:'https://i.postimg.cc/TwbQm8f5/永昌_新竹中油_3米白_進場2.jpg'}, {name:'屋型帳', img:'https://i.postimg.cc/76r0F5rH/賢哥_萬華金義宮_3米6紅進場.jpg'}, {name:'阿里山帳', img:'https://i.postimg.cc/zfX9nGPQ/賢哥南港高中_3米紅白_進場4.jpg'}]},
    'stage': { title: '舞台架設', tab: 'gallery-4', items: [{name:'3*6舞台', img:'https://i.postimg.cc/fLvbNBgy/傳動_考試院_舞台進場.jpg'}, {name:'6*6舞台', img:'https://i.postimg.cc/fLFnWQ5b/109915.jpg'}]},
    'others': { title: '活動周邊', tab: 'gallery-5', items: [{name:'伸縮圍欄', img:'https://i.postimg.cc/5t6s4Yr5/法克市府轉運站_紅龍進場.jpg'}, {name:'垃圾架', img:'https://i.postimg.cc/d1rGJVsb/汎馬_中和國小_垃圾架_進場.jpg'}]}
};

// 【關鍵修正】自動注入相簿圖片的函數
function renderAlbum() {
    const tabContent = document.getElementById('albumTabContent');
    tabContent.innerHTML = ''; 
    for(const key in productLibrary) {
        const cat = productLibrary[key];
        const pane = document.createElement('div');
        pane.className = `tab-pane fade ${key==='chairs'?'show active':''}`;
        pane.id = cat.tab;
        pane.innerHTML = `<h4>${cat.title}</h4><div class="row"></div>`;
        const row = pane.querySelector('.row');
        cat.items.forEach(item => {
            row.innerHTML += `<div class="col-md-3 col-6 mb-3"><img src="${item.img}" class="album-thumb"><p class="small text-center">${item.name}</p></div>`;
        });
        tabContent.appendChild(pane);
    }
}

function openProductModal(key) {
    const data = productLibrary[key];
    const list = document.getElementById('prod-list');
    list.innerHTML = '';
    data.items.forEach((item, idx) => {
        const btn = document.createElement('button');
        btn.className = 'list-group-item';
        btn.innerText = item.name;
        btn.onclick = () => { document.getElementById('prod-img').src = item.img; document.getElementById('prod-name').innerText = item.name; };
        list.appendChild(btn);
        if(idx===0) btn.click();
    });
    new bootstrap.Modal(document.getElementById('productModal')).show();
}

function closeProductAndOpenAlbum() {
    bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
    new bootstrap.Modal(document.getElementById('albumModal')).show();
}

window.onload = () => {
    renderAlbum(); // 執行注入
    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1500);
};
</script>
</body>
</html>
