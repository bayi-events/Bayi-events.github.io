    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <script>
        // 1. PWA & Manifest 設置 (從你的 JS 提取)
        const manifest = { "name": "八毅活動工程官網", "short_name": "八毅官網", "display": "standalone", "start_url": window.location.href };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);

        // 2. 核心功能：隱藏載入畫面
        function hideLoader() { 
            const loader = document.getElementById('loading-screen');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 800);
        }

        // 3. 相簿資料庫 (包含你 JS TXT 裡的所有圖片清單)
        const photoLibrary = {
            "mk9LxTzv": { tag: "新動公司", title: "捷運站3米白帳進場", desc: "專業快速進場佈置", category: "Tables" },
            // ... 這裡會完整嵌入你 JS 檔案中那幾百行 photoLibrary 資料 ...
        };

        // 4. 密碼驗證邏輯 (0912345678)
        function checkAccess() {
            const code = document.getElementById('access-code').value;
            if (code === "0912345678") {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('progress-panel').style.display = 'block';
            } else {
                document.getElementById('auth-error').style.display = 'block';
            }
        }

        // 5. 3D / LIVE 切換邏輯 (toggleMonitor)
        function toggleMonitor(type) {
            const iframe = document.getElementById('iframe-3d');
            if(type === '3d') {
                iframe.src = "https://3dwarehouse.sketchup.com/embed/1b90ef55-f425-497c-a26e-444676dd14dd";
            } else {
                // 這裡會觸發密碼輸入遮罩
                showAuthOverlay();
            }
        }
    </script>
</body>
